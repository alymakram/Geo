<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Geo Earth 🌎 - Geographic Knowledge Base</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #003366 50%, #001f3f 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .globe-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #4facfe;
            font-size: 1.8em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 1.1em;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(79, 172, 254, 0.3);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            color: #001f3f;
        }

        input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 4px solid #4facfe;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
            color: #4facfe;
        }

        .result p {
            font-size: 1.5em;
            font-weight: bold;
        }

        .tx-info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(79, 172, 254, 0.1);
            border-radius: 8px;
            font-size: 0.85em;
            word-break: break-all;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.85em;
            border-left: 3px solid #4facfe;
        }

        .network-badge {
            display: inline-block;
            background: #4facfe;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .card {
                padding: 20px;
            }
            
            .result p {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="globe-icon">🌎</div>
            <h1>Geo Earth</h1>
            <p>Discover the world - Every query on blockchain!</p>
            <div class="network-badge" id="networkStatus">Connecting...</div>
        </div>

        <div class="card">
            <h2>🏙️ City to Country</h2>
            <div class="input-group">
                <label>Enter any city:</label>
                <input type="text" id="cityInput" placeholder="e.g., London, Tokyo, New York" />
            </div>
            <button id="cityBtn">Discover Country 🌍</button>
            <div id="cityResult" style="display: none;"></div>
        </div>

        <div class="card">
            <h2>🗺️ Country to Capital</h2>
            <div class="input-group">
                <label>Enter any country:</label>
                <input type="text" id="countryInput" placeholder="e.g., France, Japan, Brazil" />
            </div>
            <button id="countryBtn">Find Capital 🏛️</button>
            <div id="countryResult" style="display: none;"></div>
        </div>
    </div>

    <div class="status" id="status">
        Ready to explore! 🌎

        let web3;

        async function init() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const accounts = await web3.eth.getAccounts();
                    userAccount = accounts[0];
                    
                    const chainId = await web3.eth.getChainId();
                    if (chainId === 8453) {
                        document.getElementById('networkStatus').innerHTML = '✓ Base Mainnet';
                    } else if (chainId === 84532) {
                        document.getElementById('networkStatus').innerHTML = '✓ Base Sepolia';
                    } else {
                        document.getElementById('networkStatus').innerHTML = '⚠️ Please switch to Base Network';
                        document.getElementById('status').innerHTML = '⚠️ Please switch to Base Network in MetaMask';
                    }
                    
                    contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
                    document.getElementById('status').innerHTML = '✓ Connected to Base! Ready to explore 🌎';
                    setupEventListeners();
                    
                } catch (error) {
                    console.error(error);
                    document.getElementById('status').innerHTML = '❌ Error connecting: ' + error.message;
                }
            } else {
                document.getElementById('status').innerHTML = '❌ Please install MetaMask to use this dApp';
                document.getElementById('networkStatus').innerHTML = 'MetaMask Required';
            }
        }

        async function sendTransaction(txFunction, params) {
            try {
                const gasEstimate = await txFunction(...params).estimateGas({ from: userAccount });
                const result = await txFunction(...params).send({
                    from: userAccount,
                    gas: Math.min(Math.floor(gasEstimate * 1.1), 300000),
                    gasPrice: await web3.eth.getGasPrice()
                });
                return result;
            } catch (error) {
                throw error;
            }
        }

        async function getCountry() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                alert('Please enter a city name');
                return;
            }
            
            const btn = document.getElementById('cityBtn');
            const resultDiv = document.getElementById('cityResult');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Querying Blockchain...';
            resultDiv.style.display = 'none';
            
            try {
                const tx = await sendTransaction(contract.methods.getCountryByCity, [city]);
                const events = tx.events.GeoQueried;
                if (events && events.returnValues.result) {
                    const country = events.returnValues.result;
                    resultDiv.innerHTML = `
                        <div class="result">
                            <h3>📍 Country</h3>
                            <p>${country}</p>
                            <div class="tx-info">
                                🔗 Transaction: <a href="https://basescan.org/tx/${tx.transactionHash}" target="_blank" style="color:#4facfe">${tx.transactionHash.substring(0, 20)}...</a>
                            </div>
                        </div>
                    `;
                    resultDiv.style.display = 'block';
                    document.getElementById('status').innerHTML = `✓ Found! Transaction confirmed on Base`;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result">
                        <h3>❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                resultDiv.style.display = 'block';
                document.getElementById('status').innerHTML = '❌ Transaction failed';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Discover Country 🌍';
            }
        }
